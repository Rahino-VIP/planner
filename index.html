<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قطب‌نمای ۲.۰ - موتور هوشمند</title>
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet" />
    
    <style>
        :root { 
            --pink: #d97b7b; --pink-light: #fbecec; 
            --green: #7ca881; --green-light: #e5eee6; 
            --yellow: #fca311; --yellow-light: #fffdf5;
            --blue: #4ea8de; --blue-light: #e3f2fd;
            --bg: #f4f0ec; --text-dark: #2c3e50; --white: #ffffff; 
            --shadow: 0 8px 25px rgba(124, 168, 129, 0.25);
        }
        * { box-sizing: border-box; font-family: 'Vazirmatn', sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text-dark); min-height: 100vh; padding: 30px 15px; background-image: radial-gradient(var(--green-light) 2px, transparent 2px); background-size: 25px 25px; display: flex; justify-content: center;}
        
        .main-container { width: 100%; max-width: 600px; display: flex; flex-direction: column; gap: 20px; }
        .card { background: rgba(255, 255, 255, 0.98); border-radius: 24px; padding: 30px; border: 2px solid var(--white); box-shadow: var(--shadow); }
        
        h1 { text-align: center; font-size: 28px; font-weight: 900; color: var(--text-dark); margin-bottom: 5px; }
        .subtitle { text-align: center; color: var(--green); font-size: 14px; font-weight: bold; margin-bottom: 25px; }
        .section-title { color: var(--white); background: var(--pink); padding: 8px 15px; border-radius: 12px; font-size: 15px; margin: 25px 0 15px 0; display: inline-block; font-weight: bold; box-shadow: 0 4px 10px rgba(217, 123, 123, 0.3); }
        
        /* استایل اسلایدرهای جذاب (مشابه فایل اصلی شما) */
        .slider-frame { background: var(--white); border: 2px solid var(--green-light); border-radius: 16px; padding: 18px; margin-bottom: 12px; box-shadow: inset 0 2px 6px rgba(0,0,0,0.03); }
        .slider-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; font-weight: bold; font-size: 14px; }
        .val-badge { display: inline-block; background: var(--green-light); color: var(--green); padding: 4px 12px; border-radius: 10px; font-weight: 900; font-size: 14px; }
        input[type="range"] { width: 100%; -webkit-appearance: none; background: transparent; }
        input[type="range"]:focus { outline: none; }
        input[type="range"]::-webkit-slider-runnable-track { width: 100%; height: 12px; cursor: pointer; background: #e0e8e1; border-radius: 10px; border: 1px solid #c2d4c4; }
        input[type="range"]::-webkit-slider-thumb { border: 3px solid var(--white); height: 28px; width: 28px; border-radius: 50%; background: var(--pink); cursor: pointer; -webkit-appearance: none; margin-top: -9px; box-shadow: 0 3px 6px rgba(0,0,0,0.3); }

        /* استایل دراپ‌داون‌ها */
        .select-group { display: flex; flex-direction: column; gap: 15px; }
        .select-box label { display: block; font-size: 14px; margin-bottom: 8px; font-weight: bold; color: var(--text-dark); }
        .select-box select { width: 100%; padding: 12px; border-radius: 14px; border: 2px solid var(--green-light); font-size: 15px; font-weight: bold; height: 110px; background: #fafbfc; outline: none; transition: 0.3s;}
        .select-box select:focus { border-color: var(--pink); box-shadow: 0 0 0 4px var(--pink-light); }

        .btn-primary { width: 100%; padding: 18px; border-radius: 16px; border: none; font-weight: bold; font-size: 17px; cursor: pointer; background: linear-gradient(135deg, var(--pink), #c76565); color: var(--white); box-shadow: 0 6px 20px rgba(217, 123, 123, 0.4); transition: 0.2s; margin-top: 20px; }
        .btn-primary:active { transform: scale(0.96); }
        .btn-primary:disabled { background: #ccc; cursor: not-allowed; box-shadow: none; }

        /* استایل خروجی برنامه */
        #outputArea { display: none; }
        .schedule-day-card { background: var(--white); border: 2px solid var(--blue); border-radius: 20px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(78, 168, 222, 0.1); overflow: hidden; }
        .day-header { background: var(--blue-light); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px dashed var(--blue); }
        .day-title { font-weight: 900; color: #1c5b82; font-size: 18px; }
        .day-stats { background: var(--blue); color: var(--white); padding: 5px 12px; border-radius: 10px; font-size: 13px; font-weight: bold; }
        .part-list { padding: 15px; display: flex; flex-direction: column; gap: 12px; }
        .part-item { background: #fcfcfc; border: 1px solid #eee; border-radius: 14px; padding: 15px; position: relative; overflow: hidden; }
        .part-item::before { content: ''; position: absolute; right: 0; top: 0; bottom: 0; width: 6px; background: var(--yellow); border-radius: 0 14px 14px 0; }
        .part-header { display: flex; justify-content: space-between; margin-bottom: 5px; }
        .part-subject { font-weight: 900; font-size: 16px; color: var(--text-dark); }
        .part-time { color: var(--pink); font-weight: bold; font-size: 14px; background: var(--pink-light); padding: 3px 10px; border-radius: 8px; }
        .part-topic { font-size: 13px; color: #7f8c8d; font-weight: bold; }
        
        .loader { text-align: center; font-weight: bold; color: var(--pink); display: none; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="main-container">
        
        <div class="card" id="inputSection">
            <div style="text-align: center; font-size: 50px; margin-bottom: 10px;">🧭</div>
            <h1>قطب‌نمای هوشمند</h1>
            <p class="subtitle">تولید برنامه اختصاصی با هوش مصنوعی</p>

            <span class="section-title">⏱️ ظرفیت مطالعه در طول هفته</span>
            
            <div class="slider-frame">
                <div class="slider-header"><label>شنبه</label><span class="val-badge" id="v_day0">5 ساعت</span></div>
                <input type="range" id="day_0" min="0" max="15" step="0.5" value="5" oninput="document.getElementById('v_day0').innerText = this.value + ' ساعت'">
            </div>
            <div class="slider-frame">
                <div class="slider-header"><label>یکشنبه</label><span class="val-badge" id="v_day1">5 ساعت</span></div>
                <input type="range" id="day_1" min="0" max="15" step="0.5" value="5" oninput="document.getElementById('v_day1').innerText = this.value + ' ساعت'">
            </div>
            <div class="slider-frame">
                <div class="slider-header"><label>دوشنبه</label><span class="val-badge" id="v_day2">5 ساعت</span></div>
                <input type="range" id="day_2" min="0" max="15" step="0.5" value="5" oninput="document.getElementById('v_day2').innerText = this.value + ' ساعت'">
            </div>
            <div class="slider-frame">
                <div class="slider-header"><label>سه‌شنبه</label><span class="val-badge" id="v_day3">4 ساعت</span></div>
                <input type="range" id="day_3" min="0" max="15" step="0.5" value="4" oninput="document.getElementById('v_day3').innerText = this.value + ' ساعت'">
            </div>
            <div class="slider-frame">
                <div class="slider-header"><label>چهارشنبه</label><span class="val-badge" id="v_day4">5 ساعت</span></div>
                <input type="range" id="day_4" min="0" max="15" step="0.5" value="5" oninput="document.getElementById('v_day4').innerText = this.value + ' ساعت'">
            </div>
            <div class="slider-frame" style="border-color: var(--pink-light); background: #fffdf5;">
                <div class="slider-header"><label style="color: var(--pink);">پنجشنبه (جبرانی/مرور)</label><span class="val-badge" id="v_day5" style="background: var(--pink-light); color: var(--pink);">8 ساعت</span></div>
                <input type="range" id="day_5" min="0" max="15" step="0.5" value="8" oninput="document.getElementById('v_day5').innerText = this.value + ' ساعت'">
            </div>
            <div class="slider-frame" style="border-color: var(--pink-light); background: #fffdf5;">
                <div class="slider-header"><label style="color: var(--pink);">جمعه (آزمون)</label><span class="val-badge" id="v_day6" style="background: var(--pink-light); color: var(--pink);">6 ساعت</span></div>
                <input type="range" id="day_6" min="0" max="15" step="0.5" value="6" oninput="document.getElementById('v_day6').innerText = this.value + ' ساعت'">
            </div>

            <span class="section-title">🎯 کالیبره کردن دروس</span>
            <div class="select-group">
                <div class="select-box">
                    <label>ضعف دارم (نیاز به پارت‌های بیشتر):</label>
                    <select id="weakSubjects" multiple>
                        <option value="فیزیک ۳" selected>فیزیک ۳</option>
                        <option value="ریاضی ۳" selected>ریاضی ۳</option>
                        <option value="شیمی ۳">شیمی ۳</option>
                        <option value="زیست‌شناسی ۳">زیست‌شناسی ۳</option>
                        <option value="عربی ۳">عربی ۳</option>
                    </select>
                </div>
                <div class="select-box">
                    <label>قوی هستم (مرور سریع‌تر):</label>
                    <select id="strongSubjects" multiple>
                        <option value="دین و زندگی ۳" selected>دین و زندگی ۳</option>
                        <option value="فارسی ۳">فارسی ۳</option>
                        <option value="زمین‌شناسی">زمین‌شناسی</option>
                    </select>
                </div>
            </div>

            <button class="btn-primary" id="btnGenerate" onclick="processAI()">🚀 ساخت برنامه جادویی</button>
            <div class="loader" id="loadingText">در حال ارتباط با هسته مرکزی و تحلیل داده‌ها... ⏳</div>
        </div>

        <div class="card" id="outputArea">
            <h2 style="text-align:center; color:var(--text-dark); margin-bottom:5px;">برنامه اختصاصی شما</h2>
            <p id="totalStats" style="text-align:center; font-size:13px; color:var(--green); font-weight:bold; margin-bottom:25px;"></p>
            
            <div id="scheduleContainer"></div>

            <button class="btn-primary" style="background: var(--text-dark); margin-top: 30px;" onclick="location.reload()">🔄 بازگشت و تغییر تنظیمات</button>
        </div>

    </div>

    <script>
        // ==========================================
        // ۱. تنظیمات اتصال امن به سوپابیس (Native REST)
        // ==========================================
        const SUPABASE_URL = 'https://lajkvzlbvidiradmyowc.supabase.co'; 
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxhamt2emxidmlkaXJhZG15b3djIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0MjcyNDksImV4cCI6MjA5NzAwMzI0OX0.IB_fVUyK4kejuy88p_R7zn8xdCst9OVRqWBMoo_bNKY';
        const daysOfWeek = ['شنبه', 'یکشنبه', 'دوشنبه', 'سه‌شنبه', 'چهارشنبه', 'پنجشنبه', 'جمعه'];

        // ==========================================
        // ۲. هسته الگوریتم هوش مصنوعی (AI Engine)
        // ==========================================
        function runAIEngine(dailyCapacities, weakSubjects, strongSubjects, syllabusData) {
            let totalAvailableMinutes = dailyCapacities.reduce((a, b) => a + b, 0);
            
            // وزن‌دهی به دروس بر اساس نقاط ضعف و قوت
            let totalNeededMinutes = 0;
            let weightedSyllabus = syllabusData.map(topic => {
                let weight = 1.0;
                if (weakSubjects.includes(topic.subject)) weight = 1.5;
                else if (strongSubjects.includes(topic.subject)) weight = 0.7;
                
                let adjustedTime = topic.standard_time_minutes * weight;
                totalNeededMinutes += adjustedTime;
                return { ...topic, adjustedTime: adjustedTime };
            });

            // خرد کردن مباحث به پارت‌های مطالعاتی (Chunks)
            let allChunks = [];
            weightedSyllabus.forEach(topic => {
                let finalTime = Math.floor((topic.adjustedTime / totalNeededMinutes) * totalAvailableMinutes);
                let chunkCount = Math.ceil(finalTime / 90); // پارت‌های استاندارد 90 دقیقه‌ای
                
                for(let i = 0; i < chunkCount; i++) {
                    let duration = (i === chunkCount - 1 && finalTime % 90 !== 0) ? (finalTime % 90) : 90;
                    if(duration >= 30) { // فیلتر کردن پارت‌های خیلی کوتاه
                        allChunks.push({ subject: topic.subject, topic_name: topic.topic_name, duration: duration });
                    }
                }
            });

            // توزیع هوشمند پارت‌ها در روزهای هفته (Interleaving & Capacity Planning)
            let weeklySchedule = [ [], [], [], [], [], [], [] ]; 
            let currentDayIndex = 0;

            // شافل (بُر زدن) پارت‌ها برای جلوگیری از تکرار یک درس در یک روز
            allChunks.sort(() => Math.random() - 0.5); 

            allChunks.forEach(chunk => {
                for (let i = 0; i < 7; i++) {
                    let checkDay = (currentDayIndex + i) % 7;
                    let dayCapacity = dailyCapacities[checkDay];
                    let usedInThisDay = weeklySchedule[checkDay].reduce((sum, c) => sum + c.duration, 0);
                    
                    if (usedInThisDay + chunk.duration <= dayCapacity) {
                        weeklySchedule[checkDay].push(chunk);
                        currentDayIndex = checkDay; // شیفت به روز بعد برای تعادل
                        break;
                    }
                }
            });

            return weeklySchedule;
        }

        // ==========================================
        // ۳. کنترلر اصلی (ارتباط با بک‌اند و رندر UI)
        // ==========================================
        async function processAI() {
            const btn = document.getElementById('btnGenerate');
            const loader = document.getElementById('loadingText');
            const inputSection = document.getElementById('inputSection');
            const outputArea = document.getElementById('outputArea');
            const container = document.getElementById('scheduleContainer');
            
            btn.disabled = true;
            loader.style.display = 'block';

            try {
                // الف) جمع‌آوری اطلاعات از رابط کاربری
                let dailyCapacities = [];
                for(let i=0; i<7; i++) {
                    let hours = parseFloat(document.getElementById('day_'+i).value) || 0;
                    dailyCapacities.push(hours * 60); // تبدیل به دقیقه
                }

                let weakSubjects = Array.from(document.getElementById('weakSubjects').selectedOptions).map(o => o.value);
                let strongSubjects = Array.from(document.getElementById('strongSubjects').selectedOptions).map(o => o.value);

                // ب) دریافت بودجه‌بندی خام از سوپابیس (با استفاده از fetch استاندارد و امن)
                const apiUrl = `${SUPABASE_URL}/rest/v1/master_syllabus?exam_date_shamsi=eq.${encodeURIComponent('1403/07/18')}`;
                const response = await fetch(apiUrl, {
                    method: 'GET',
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`,
                        'Content-Type': 'application/json'
                    }
                });

                if (!response.ok) throw new Error("ارتباط با هسته دیتابیس مسدود شده است.");
                const syllabus = await response.json();
                if (!syllabus || syllabus.length === 0) throw new Error("بودجه‌بندی آزمون در دیتابیس یافت نشد.");

                // ج) پردازش در مغز هوش مصنوعی
                let weeklySchedule = runAIEngine(dailyCapacities, weakSubjects, strongSubjects, syllabus);

                // د) رندر کردن گرافیکی نتیجه
                inputSection.style.display = 'none';
                outputArea.style.display = 'block';
                container.innerHTML = '';
                
                let totalPlacedChunks = 0;
                let totalPlacedMinutes = 0;

                weeklySchedule.forEach((dayChunks, index) => {
                    if(dayChunks.length === 0) return; 
                    
                    let dayTotalMinutes = dayChunks.reduce((sum, c) => sum + c.duration, 0);
                    let dayTotalHours = (dayTotalMinutes / 60).toFixed(1);
                    totalPlacedChunks += dayChunks.length;
                    totalPlacedMinutes += dayTotalMinutes;

                    let html = `
                    <div class="schedule-day-card">
                        <div class="day-header">
                            <span class="day-title">📅 ${daysOfWeek[index]}</span>
                            <span class="day-stats">${dayTotalHours} ساعت مطالعه</span>
                        </div>
                        <div class="part-list">
                    `;

                    dayChunks.forEach((chunk, cIndex) => {
                        html += `
                            <div class="part-item">
                                <div class="part-header">
                                    <span class="part-subject">${cIndex + 1}. ${chunk.subject}</span>
                                    <span class="part-time">${chunk.duration} دقیقه</span>
                                </div>
                                <div class="part-topic">🔹 مبحث: ${chunk.topic_name}</div>
                            </div>
                        `;
                    });

                    html += `</div></div>`;
                    container.innerHTML += html;
                });

                document.getElementById('totalStats').innerText = `پیکربندی موفق: ${totalPlacedChunks} پارت مطالعاتی (${Math.round(totalPlacedMinutes/60)} ساعت کل) تنظیم شد.`;

            } catch (err) {
                console.error(err);
                alert("خطای سیستم: " + err.message);
                btn.disabled = false;
                loader.style.display = 'none';
            }
        }
    </script>
</body>
</html>
