<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>برنامه‌ریز هوشمند VIP راهینو</title>
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet" />
    <style>
        :root { 
            --pink: #d97b7b; --pink-light: #fbecec; 
            --green: #7ca881; --green-light: #e5eee6; 
            --yellow: #fca311; --yellow-light: #fffdf5;
            --bg: #f4f0ec; --text-dark: #2c3e50; --white: #ffffff; 
        }
        * { box-sizing: border-box; font-family: 'Vazirmatn', sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text-dark); min-height: 100vh; padding: 20px; }
        .main-wrapper { max-width: 800px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }
        
        .card { background: rgba(255, 255, 255, 0.98); border-radius: 24px; padding: 30px; border: 2px solid var(--white); box-shadow: 0 8px 25px rgba(124, 168, 129, 0.15); }
        h1 { text-align: center; font-size: 26px; font-weight: 900; color: var(--text-dark); margin-bottom: 5px; }
        .subtitle { text-align: center; color: var(--green); font-size: 14px; font-weight: bold; margin-bottom: 25px; }
        
        .section-title { color: var(--white); background: var(--pink); padding: 6px 15px; border-radius: 12px; font-size: 14px; margin-bottom: 15px; display: inline-block; font-weight: bold; }
        
        .days-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; margin-bottom: 25px; }
        .day-input-box { background: var(--green-light); padding: 15px; border-radius: 16px; text-align: center; border: 1px solid #c2d4c4;}
        .day-input-box label { display: block; font-weight: bold; font-size: 13px; color: var(--text-dark); margin-bottom: 8px; }
        .day-input-box input { width: 100%; text-align: center; padding: 8px; border-radius: 10px; border: none; font-weight: bold; font-size: 16px; color: var(--green); }
        .day-input-box input:focus { outline: 2px solid var(--green); }

        .select-group { display: flex; gap: 15px; margin-bottom: 25px; flex-wrap: wrap;}
        .select-box { flex: 1; min-width: 250px; }
        .select-box label { display: block; font-size: 14px; margin-bottom: 8px; font-weight: bold; }
        .select-box select { width: 100%; padding: 10px; border-radius: 14px; border: 2px solid var(--green-light); font-size: 14px; font-weight: bold; height: 90px; background: #fafbfc; }

        .btn-primary { width: 100%; padding: 18px; border-radius: 16px; border: none; font-weight: bold; font-size: 16px; cursor: pointer; background: linear-gradient(135deg, var(--pink), #c76565); color: var(--white); box-shadow: 0 6px 20px rgba(217, 123, 123, 0.4); transition: 0.3s; }
        .btn-primary:active { transform: scale(0.98); }

        .schedule-day-card { background: var(--white); border: 2px solid var(--yellow); border-radius: 16px; margin-bottom: 15px; overflow: hidden; }
        .day-header { background: var(--yellow-light); padding: 12px 20px; font-weight: bold; color: #b5740a; border-bottom: 2px dashed var(--yellow); display: flex; justify-content: space-between; }
        .part-list { padding: 15px 20px; display: flex; flex-direction: column; gap: 10px; }
        .part-item { display: flex; justify-content: space-between; align-items: center; background: var(--bg); padding: 12px 15px; border-radius: 12px; border-right: 4px solid var(--green); }
        .part-info { display: flex; flex-direction: column; }
        .part-subject { font-weight: 900; font-size: 15px; color: var(--text-dark); }
        .part-topic { font-size: 12px; color: #666; margin-top: 4px; }
        .part-time { background: var(--green-light); color: var(--green); padding: 5px 12px; border-radius: 8px; font-weight: bold; font-size: 13px; }
        
        #outputArea { display: none; }
    </script>
</head>
<body>

    <div class="main-wrapper">
        <div class="card">
            <h1>هسته برنامه‌ریزی قطب‌نما</h1>
            <p class="subtitle">نسخه VIP - توزیع هوشمند روزانه</p>

            <span class="section-title">⏱️ ظرفیت آزاد شما (به ساعت)</span>
            <div class="days-grid">
                <div class="day-input-box"><label>شنبه</label><input type="number" id="day_0" value="5" min="0" max="16"></div>
                <div class="day-input-box"><label>یکشنبه</label><input type="number" id="day_1" value="5" min="0" max="16"></div>
                <div class="day-input-box"><label>دوشنبه</label><input type="number" id="day_2" value="5" min="0" max="16"></div>
                <div class="day-input-box"><label>سه‌شنبه</label><input type="number" id="day_3" value="4" min="0" max="16"></div>
                <div class="day-input-box"><label>چهارشنبه</label><input type="number" id="day_4" value="5" min="0" max="16"></div>
                <div class="day-input-box" style="border-color:var(--pink);"><label style="color:var(--pink);">پنجشنبه</label><input type="number" id="day_5" value="8" min="0" max="16"></div>
                <div class="day-input-box" style="border-color:var(--pink);"><label style="color:var(--pink);">جمعه</label><input type="number" id="day_6" value="6" min="0" max="16"></div>
            </div>

            <span class="section-title">🎯 خودارزیابی دروس</span>
            <div class="select-group">
                <div class="select-box">
                    <label>نیاز به زمان بیشتر (ضعیف):</label>
                    <select id="weakSubjects" multiple>
                        <option value="فیزیک ۳" selected>فیزیک ۳</option>
                        <option value="ریاضی ۳" selected>ریاضی ۳</option>
                        <option value="شیمی ۳">شیمی ۳</option>
                        <option value="زیست‌شناسی ۳">زیست‌شناسی ۳</option>
                    </select>
                </div>
                <div class="select-box">
                    <label>تسلط بالا (قوی):</label>
                    <select id="strongSubjects" multiple>
                        <option value="دین و زندگی ۳" selected>دین و زندگی ۳</option>
                        <option value="فارسی ۳">فارسی ۳</option>
                        <option value="زمین‌شناسی">زمین‌شناسی</option>
                    </select>
                </div>
            </div>

            <button class="btn-primary" id="btnGenerate" onclick="runAI()">جادوی برنامه‌ریزی 🚀</button>
        </div>

        <div class="card" id="outputArea">
            <h2 style="text-align:center; color:var(--text-dark); margin-bottom:5px;">برنامه اختصاصی هفته</h2>
            <p id="totalStats" style="text-align:center; font-size:13px; color:var(--pink); font-weight:bold; margin-bottom:20px;"></p>
            
            <div id="scheduleContainer"></div>
        </div>
    </div>

    <script>
        // ۱. اطلاعات اتصال مستقیم (Native REST)
        const SUPABASE_URL = 'https://lajkvzlbvidiradmyowc.supabase.co'; 
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxhamt2emxidmlkaXJhZG15b3djIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0MjcyNDksImV4cCI6MjA5NzAwMzI0OX0.IB_fVUyK4kejuy88p_R7zn8xdCst9OVRqWBMoo_bNKY';
        
        const daysOfWeek = ['شنبه', 'یکشنبه', 'دوشنبه', 'سه‌شنبه', 'چهارشنبه', 'پنجشنبه', 'جمعه'];

        // ۲. موتور توزیع هوشمند روزانه
        function generateAndDistributeSchedule(dailyCapacities, weakSubjects, strongSubjects, syllabusData) {
            let totalAvailableMinutes = dailyCapacities.reduce((a, b) => a + b, 0);
            
            let totalNeededMinutes = 0;
            let weightedSyllabus = syllabusData.map(topic => {
                let weight = 1.0;
                if (weakSubjects.includes(topic.subject)) weight = 1.5;
                else if (strongSubjects.includes(topic.subject)) weight = 0.7;
                
                let adjustedTime = topic.standard_time_minutes * weight;
                totalNeededMinutes += adjustedTime;
                return { ...topic, adjustedTime: adjustedTime };
            });

            let allChunks = [];
            weightedSyllabus.forEach(topic => {
                let finalTime = Math.floor((topic.adjustedTime / totalNeededMinutes) * totalAvailableMinutes);
                let chunkCount = Math.ceil(finalTime / 90); 
                
                for(let i = 0; i < chunkCount; i++) {
                    let duration = (i === chunkCount - 1 && finalTime % 90 !== 0) ? (finalTime % 90) : 90;
                    if(duration >= 30) { 
                        allChunks.push({ subject: topic.subject, topic_name: topic.topic_name, duration: duration });
                    }
                }
            });

            let weeklySchedule = [ [], [], [], [], [], [], [] ]; 
            let currentDayIndex = 0;

            allChunks.sort(() => Math.random() - 0.5); 

            allChunks.forEach(chunk => {
                for (let i = 0; i < 7; i++) {
                    let checkDay = (currentDayIndex + i) % 7;
                    let dayCapacity = dailyCapacities[checkDay];
                    let usedInThisDay = weeklySchedule[checkDay].reduce((sum, c) => sum + c.duration, 0);
                    
                    if (usedInThisDay + chunk.duration <= dayCapacity) {
                        weeklySchedule[checkDay].push(chunk);
                        currentDayIndex = checkDay; 
                        break;
                    }
                }
            });

            return weeklySchedule;
        }

        // ۳. ارتباط با سرور و اجرای هوش مصنوعی
        async function runAI() {
            let btn = document.getElementById('btnGenerate');
            let output = document.getElementById('outputArea');
            let container = document.getElementById('scheduleContainer');
            
            btn.innerText = "در حال ارتباط امن با هسته مرکزی...";
            btn.disabled = true;

            try {
                let dailyCapacities = [];
                for(let i=0; i<7; i++) {
                    let hours = parseFloat(document.getElementById('day_'+i).value) || 0;
                    dailyCapacities.push(hours * 60);
                }

                let weakSubjects = Array.from(document.getElementById('weakSubjects').selectedOptions).map(o => o.value);
                let strongSubjects = Array.from(document.getElementById('strongSubjects').selectedOptions).map(o => o.value);

                // استفاده از API بومی مرورگر (بدون کتابخانه و بدون ارور CSP)
                const apiUrl = `${SUPABASE_URL}/rest/v1/master_syllabus?exam_date_shamsi=eq.${encodeURIComponent('1403/07/18')}`;
                
                const response = await fetch(apiUrl, {
                    method: 'GET',
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`,
                        'Content-Type': 'application/json'
                    }
                });

                if (!response.ok) throw new Error("اتصال به دیتابیس برقرار نشد.");
                
                const syllabus = await response.json();
                if (!syllabus || syllabus.length === 0) throw new Error("دیتایی در دیتابیس برای این تاریخ یافت نشد.");

                btn.innerText = "در حال پردازش هوشمند...";

                let weeklySchedule = generateAndDistributeSchedule(dailyCapacities, weakSubjects, strongSubjects, syllabus);

                output.style.display = 'block';
                container.innerHTML = '';
                
                let totalPlacedChunks = 0;

                weeklySchedule.forEach((dayChunks, index) => {
                    if(dayChunks.length === 0) return; 
                    
                    let dayTotalMinutes = dayChunks.reduce((sum, c) => sum + c.duration, 0);
                    let dayTotalHours = (dayTotalMinutes / 60).toFixed(1);
                    totalPlacedChunks += dayChunks.length;

                    let html = `
                    <div class="schedule-day-card">
                        <div class="day-header">
                            <span>📅 ${daysOfWeek[index]}</span>
                            <span>${dayTotalHours} ساعت مطالعه</span>
                        </div>
                        <div class="part-list">
                    `;

                    dayChunks.forEach((chunk, cIndex) => {
                        html += `
                            <div class="part-item">
                                <div class="part-info">
                                    <span class="part-subject">${cIndex + 1}. ${chunk.subject}</span>
                                    <span class="part-topic">${chunk.topic_name}</span>
                                </div>
                                <div class="part-time">${chunk.duration} دقیقه</div>
                            </div>
                        `;
                    });

                    html += `</div></div>`;
                    container.innerHTML += html;
                });

                document.getElementById('totalStats').innerText = `✅ مجموعاً ${totalPlacedChunks} پارت مطالعاتی به صورت هوشمند در طول هفته توزیع شد.`;

                btn.innerText = "جادوی برنامه‌ریزی 🚀";
                btn.disabled = false;

                output.scrollIntoView({ behavior: 'smooth' });

            } catch (err) {
                console.error(err);
                alert("خطا: " + err.message);
                btn.innerText = "تلاش مجدد";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
